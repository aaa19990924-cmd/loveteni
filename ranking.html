<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人気投票ランキング | LOVETENI ラブテニ</title>
<meta name="description" content="テニスプレーヤーが選ぶ人気ラケット・ガット・用品ランキング。みんなの一票でリアルな人気が分かる。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=Noto+Serif+JP:wght@400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="ranking-data.js"></script>
<style>
:root {
  --ink: #0d1117;
  --ink-soft: #1c2128;
  --paper: #ffffff;
  --cream: #fafaf7;
  --silver: #f2f2ee;
  --line: #e2e2dc;
  --line-strong: #c9c9c1;
  --mute: #6b6b65;
  --mute-soft: #9c9c93;
  --accent: #00513a;
  --accent-bright: #008156;
  --accent-dim: rgba(0,81,58,0.08);
  --gold: #b8956a;
  --signal: #d9534f;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
::selection { background: var(--accent); color: white; }


/* ===== PAGE HERO ===== */
.page-hero {
  background: var(--ink);
  color: white;
  padding: 56px 32px 48px;
  text-align: center;
}
.page-hero-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--gold);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.page-hero-eyebrow::before,
.page-hero-eyebrow::after {
  content: '';
  display: block;
  width: 40px;
  height: 1px;
  background: var(--gold);
  opacity: 0.6;
}
.page-hero-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
}
.page-hero-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.04em;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 24px;
}
.content-wrap {
  padding: 48px 0 80px;
  flex: 1 0 auto;
}

/* ===== CATEGORY TABS ===== */
.cat-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 48px;
  overflow-x: auto;
}
.cat-tab {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 14px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  color: var(--mute);
  transition: all 0.2s;
  white-space: nowrap;
}
.cat-tab:hover { color: var(--ink); }
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ===== AUTH NOTICE ===== */
.auth-notice {
  background: var(--cream);
  border: 1px solid var(--line);
  border-left: 3px solid var(--gold);
  padding: 16px 20px;
  margin-bottom: 36px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--mute);
}
.auth-notice a { color: var(--accent); font-weight: 600; }
.auth-notice-icon { font-size: 18px; flex-shrink: 0; }

/* ===== VOTE BANNER ===== */
.vote-banner {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-radius: 2px;
  padding: 20px 24px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.vote-banner-text { font-size: 14px; }
.vote-banner-text strong { color: var(--accent); }
.vote-banner-sub { font-size: 12px; color: var(--mute); margin-top: 4px; }
.vote-status { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); }
.vote-status.voted { color: var(--gold); }

/* ===== RANKING LIST ===== */
.ranking-section { margin-bottom: 56px; }
.ranking-section-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mute);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 0;
}
.ranking-list { border: 1px solid var(--line); border-top: none; background: white; }
.rank-item {
  display: flex;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  gap: 20px;
  transition: background 0.15s;
  cursor: pointer;
}
.rank-item:last-child { border-bottom: none; }
.rank-item:hover { background: var(--cream); }
.rank-num {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--line-strong);
  min-width: 40px;
  text-align: center;
  flex-shrink: 0;
}
.rank-item:nth-child(1) .rank-num { color: #b8956a; }
.rank-item:nth-child(2) .rank-num { color: #8c8c8c; }
.rank-item:nth-child(3) .rank-num { color: #a0774e; }
.rank-info { flex: 1; min-width: 0; }
.rank-brand { font-size: 10px; letter-spacing: 0.15em; color: var(--mute); text-transform: uppercase; margin-bottom: 2px; }
.rank-name { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; }
.rank-bar-wrap { flex: 1; min-width: 120px; }
.rank-bar-bg { background: var(--silver); border-radius: 2px; height: 6px; overflow: hidden; }
.rank-bar-fill { background: var(--accent); height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.rank-votes { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: var(--mute); min-width: 60px; text-align: right; white-space: nowrap; }
.rank-votes span { font-size: 20px; color: var(--ink); }
.vote-btn {
  padding: 8px 18px;
  background: var(--accent);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  border-radius: 2px;
  transition: all 0.2s;
  flex-shrink: 0;
  min-width: 72px;
  text-align: center;
}
.vote-btn:hover { background: #003d2b; }
.vote-btn.voted-item { background: var(--cream); color: var(--gold); border: 1px solid var(--gold); }
.vote-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== VOTE SELECTOR (modal) ===== */
.vote-select-area {
  background: var(--cream);
  border: 1px solid var(--line);
  padding: 32px;
  margin-bottom: 48px;
  display: none;
}
.vote-select-area.open { display: block; }
.vote-select-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.vote-options {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.vote-option-btn {
  padding: 14px 16px;
  background: white;
  border: 1px solid var(--line-strong);
  text-align: left;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  line-height: 1.4;
}
.vote-option-btn:hover { border-color: var(--accent); color: var(--accent); }
.vote-option-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
.vote-option-brand { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; display: block; margin-bottom: 2px; }
.vote-confirm-row { margin-top: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.vote-confirm-btn {
  background: var(--accent);
  color: white;
  padding: 12px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
}
.vote-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.vote-cancel-btn { font-size: 13px; color: var(--mute); padding: 12px 16px; }
.vote-cancel-btn:hover { color: var(--ink); }
.vote-msg { font-size: 12px; color: var(--mute); margin-left: auto; }

/* ===== 2段階ブランド→モデル選択 ===== */
.vote-stage-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  color: var(--mute);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.vote-brand-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.vote-brand-btn {
  padding: 8px 20px;
  background: white;
  border: 1px solid var(--line-strong);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.vote-brand-btn:hover { border-color: var(--accent); color: var(--accent); }
.vote-brand-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
.vote-stage-back {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.vote-stage-back-btn {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  padding: 4px 0;
  border-bottom: 1px solid transparent;
}
.vote-stage-back-btn:hover { border-bottom-color: var(--accent); }
.vote-selected-brand-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--ink);
}
/* モデルボタン（画像付き） */
.vote-model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.vote-model-btn {
  padding: 12px;
  background: white;
  border: 1px solid var(--line-strong);
  text-align: left;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.15s;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.vote-model-btn:hover { border-color: var(--accent); }
.vote-model-btn.selected { border-color: var(--accent); background: var(--accent-dim); }
.vote-model-img {
  width: 100%;
  height: 80px;
  object-fit: contain;
  background: var(--silver);
}
.vote-model-img-ph {
  width: 100%;
  height: 80px;
  background: var(--silver);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: var(--line-strong);
}
.vote-model-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}
/* 選択プレビュー */
.vote-preview-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  background: white;
  border: 1px solid var(--accent);
  padding: 12px 16px;
  margin: 12px 0;
}
.vote-preview-bar-img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  flex-shrink: 0;
  background: var(--silver);
}
.vote-preview-bar-text { font-size: 13px; font-weight: 600; color: var(--ink); }
.vote-preview-bar-sub { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 0.06em; }

/* ===== LOADING ===== */
.loading-state {
  text-align: center;
  padding: 60px 0;
  font-size: 14px;
  color: var(--mute);
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.06em;
}
.spin {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--line-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== FOOTER ===== */
.site-footer {
  border-top: 1px solid var(--line);
  padding: 32px;
  text-align: center;
  font-size: 12px;
  color: var(--mute);
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header-inner { padding: 0 20px; height: 60px; gap: 16px; }
  .gnav { display: none; }
  .page-hero { padding: 40px 20px 32px; }
  .page-hero-title { font-size: 26px; }
  .container { padding: 0 20px; }
  .content-wrap { padding: 32px 0 60px; }
  .rank-item { padding: 16px 16px; gap: 12px; }
  .rank-bar-wrap { display: none; }
  .vote-options { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<script src="/js/site-header.js"></script>

<!-- ===== PAGE HERO ===== -->
<section class="page-hero">
  <div class="page-hero-eyebrow">COMMUNITY RANKING</div>
  <h1 class="page-hero-title">人気投票ランキング</h1>
  <p class="page-hero-sub">テニスプレーヤーが選ぶ、リアルな人気ランキング</p>
</section>

<!-- ===== MAIN ===== -->
<main style="flex:1 0 auto">
  <div class="container">
    <div class="content-wrap">

      <!-- カテゴリータブ -->
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab active" onclick="switchCat('rackets', this)">ラケット</button>
        <button class="cat-tab" onclick="switchCat('strings', this)">ガット</button>
        <button class="cat-tab" onclick="switchCat('balls', this)">ボール</button>
        <button class="cat-tab" onclick="switchCat('bags', this)">バッグ</button>
      </div>

      <!-- 認証・投票ステータスバナー -->
      <div id="authNotice" class="auth-notice" style="display:none">
        <span class="auth-notice-icon">🔒</span>
        <span>投票するには<a href="/">ログイン</a>が必要です。閲覧は誰でも可能です。</span>
      </div>
      <div id="voteBanner" class="vote-banner" style="display:none">
        <div>
          <div class="vote-banner-text">このカテゴリーに <strong>1票</strong> 投票できます</div>
          <div class="vote-banner-sub">カテゴリーごとに1人1票。投票は変更できません。</div>
        </div>
        <div class="vote-status" id="voteStatus">まだ投票していません</div>
      </div>

      <!-- 投票選択エリア -->
      <div class="vote-select-area" id="voteSelectArea">
        <div class="vote-select-title">どれに投票しますか？</div>

        <!-- ラケット: Stage 1 ブランド選択 -->
        <div id="voteBrandStage">
          <div class="vote-stage-label">ブランドを選ぶ</div>
          <div class="vote-brand-grid" id="voteBrandGrid"></div>
        </div>

        <!-- ラケット: Stage 2 モデル選択 -->
        <div id="voteModelStage" style="display:none">
          <div class="vote-stage-back">
            <button class="vote-stage-back-btn" onclick="backToBrandSelect()">← ブランド変更</button>
            <span class="vote-selected-brand-label" id="voteSelectedBrandLabel"></span>
          </div>
          <div class="vote-stage-label">モデルを選ぶ</div>
          <div class="vote-model-grid" id="voteModelGrid"></div>
          <!-- 選択プレビュー -->
          <div id="votePreviewBar" class="vote-preview-bar" style="display:none">
            <img id="votePreviewImg" class="vote-preview-bar-img" src="" alt="">
            <div>
              <div class="vote-preview-bar-sub" id="votePreviewBrand"></div>
              <div class="vote-preview-bar-text" id="votePreviewName"></div>
            </div>
          </div>
        </div>

        <!-- その他カテゴリ: フラットリスト -->
        <div id="voteFlatStage" style="display:none">
          <div class="vote-options" id="voteOptions"></div>
        </div>

        <div class="vote-confirm-row">
          <button class="vote-confirm-btn" id="voteConfirmBtn" disabled onclick="submitVote()">投票する</button>
          <button class="vote-cancel-btn" onclick="closeVoteSelect()">キャンセル</button>
          <span class="vote-msg" id="voteMsg"></span>
        </div>
      </div>

      <!-- ランキング表示エリア -->
      <div id="rankingArea">
        <div class="loading-state"><span class="spin"></span>読み込み中...</div>
      </div>

    </div>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
  &copy; 2024 LOVETENI — <a href="/" style="color:var(--accent)">トップへ戻る</a>
</footer>

<script>
// ===== Supabase 初期化 =====
const SUPABASE_URL = 'https://mdrejtyrmjmhitebobhc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcmVqdHlybWptaGl0ZWJvYmhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTQwODYsImV4cCI6MjA5NTI3MDA4Nn0.iXKtPsCcCyMDYWDqDZPalSaF2vQGlfPwy3CslPodGaQ';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== 投票候補データ（ラケットはranking-data.jsから） =====
// RANKING_RACKETS は ranking-data.js で定義される
const _racketsFromData = () => {
  if (typeof RANKING_RACKETS !== 'undefined') {
    return RANKING_RACKETS.map(r => ({
      id: r.id,
      brand: r.brand,
      name: r.model,
      imageUrl: r.imageUrl || null,
    }));
  }
  // フォールバック（ranking-data.js未読み込み時）
  return [
    { id: 'wilson-blade-v10', brand: 'Wilson', name: 'Blade V10', imageUrl: null },
    { id: 'babolat-pure-aero', brand: 'Babolat', name: 'Pure Aero', imageUrl: null },
    { id: 'head-speed-mp', brand: 'HEAD', name: 'Speed MP', imageUrl: null },
    { id: 'yonex-vcore-98', brand: 'YONEX', name: 'VCORE 98', imageUrl: null },
  ];
};
const VOTE_ITEMS = {
  get rackets() { return _racketsFromData(); },
  strings: [
    { id: 'luxilon-alu-power', brand: 'Luxilon', name: 'ALU Power' },
    { id: 'luxilon-4g', brand: 'Luxilon', name: '4G' },
    { id: 'babolat-rpm-blast', brand: 'Babolat', name: 'RPM Blast' },
    { id: 'babolat-vs-touch', brand: 'Babolat', name: 'VS Touch' },
    { id: 'head-hawk', brand: 'HEAD', name: 'Hawk' },
    { id: 'yonex-poly-tour-pro', brand: 'YONEX', name: 'Poly Tour Pro' },
    { id: 'yonex-poly-tour-spin', brand: 'YONEX', name: 'Poly Tour Spin' },
    { id: 'tecnifibre-multifeel', brand: 'Tecnifibre', name: 'Multifeel' },
    { id: 'wilson-nxt', brand: 'Wilson', name: 'NXT' },
    { id: 'signum-poly-plasma', brand: 'Signum Pro', name: 'Poly Plasma' },
    { id: 'solinco-tour-bite', brand: 'Solinco', name: 'Tour Bite' },
    { id: 'kirschbaum-max-power', brand: 'Kirschbaum', name: 'Max Power' },
  ],
  balls: [
    { id: 'wilson-us-open', brand: 'Wilson', name: 'US OPEN' },
    { id: 'dunlop-fort', brand: 'Dunlop', name: 'Fort' },
    { id: 'babolat-gold', brand: 'Babolat', name: 'Gold' },
    { id: 'head-atp', brand: 'HEAD', name: 'ATP' },
    { id: 'yonex-ball', brand: 'YONEX', name: 'テニスボール' },
    { id: 'tecnifibre-tf-x1', brand: 'Tecnifibre', name: 'TF-X1' },
  ],
  bags: [
    { id: 'wilson-super-tour', brand: 'Wilson', name: 'Super Tour Bag' },
    { id: 'babolat-pure-aero-rh12', brand: 'Babolat', name: 'Pure Aero RH12' },
    { id: 'head-tour-team', brand: 'HEAD', name: 'Tour Team' },
    { id: 'yonex-bag2312', brand: 'YONEX', name: 'BAG2312' },
  ],
};

// ===== 状態 =====
let currentCat = 'rackets';
let currentUser = null;
let userVotes = {};        // { category: item_id }
let rankingData = {};      // { category: [{ item_id, item_name, count }] }
let pendingVoteItem = null;

// ===== 初期化 =====
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;

  if (currentUser) {
    const { data: votes } = await sb.from('votes').select('category, item_id').eq('user_id', currentUser.id);
    if (votes) votes.forEach(v => { userVotes[v.category] = v.item_id; });
  }

  await loadRanking('rackets');
  renderUI();
}

// ===== ランキングデータ取得 =====
async function loadRanking(cat) {
  if (rankingData[cat]) return;
  const { data, error } = await sb.from('votes').select('item_id, item_name').eq('category', cat);
  if (error) { rankingData[cat] = []; return; }

  const counts = {};
  (data || []).forEach(v => {
    if (!counts[v.item_id]) counts[v.item_id] = { item_id: v.item_id, item_name: v.item_name, count: 0 };
    counts[v.item_id].count++;
  });

  const items = VOTE_ITEMS[cat] || [];
  const merged = items.map(it => ({
    item_id: it.id,
    item_name: it.name,
    brand: it.brand,
    count: counts[it.id] ? counts[it.id].count : 0,
  }));
  merged.sort((a, b) => b.count - a.count);
  rankingData[cat] = merged;
}

// ===== カテゴリー切替 =====
async function switchCat(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  closeVoteSelect();
  document.getElementById('rankingArea').innerHTML = '<div class="loading-state"><span class="spin"></span>読み込み中...</div>';
  await loadRanking(cat);
  renderUI();
}

// ===== UI描画 =====
function renderUI() {
  renderAuthBanner();
  renderRanking();
}

function renderAuthBanner() {
  const authNotice = document.getElementById('authNotice');
  const voteBanner = document.getElementById('voteBanner');
  const voteStatus = document.getElementById('voteStatus');

  if (!currentUser) {
    authNotice.style.display = '';
    voteBanner.style.display = 'none';
    return;
  }
  authNotice.style.display = 'none';
  voteBanner.style.display = '';

  const myVote = userVotes[currentCat];
  if (myVote) {
    const item = (VOTE_ITEMS[currentCat] || []).find(i => i.id === myVote);
    voteStatus.textContent = '投票済: ' + (item ? item.name : myVote);
    voteStatus.className = 'vote-status voted';
  } else {
    voteStatus.textContent = 'まだ投票していません';
    voteStatus.className = 'vote-status';
  }
}

function renderRanking() {
  const area = document.getElementById('rankingArea');
  const items = rankingData[currentCat] || [];
  const totalVotes = items.reduce((s, i) => s + i.count, 0);
  const maxCount = items.length ? items[0].count : 1;
  const myVote = userVotes[currentCat];

  if (!items.length) {
    area.innerHTML = '<div class="loading-state">まだ投票がありません。最初の一票を投じましょう！</div>';
    return;
  }

  const catLabel = { rackets: 'ラケット', strings: 'ガット', balls: 'ボール', bags: 'バッグ' };
  area.innerHTML = `
    <div class="ranking-section">
      <div class="ranking-section-title">${catLabel[currentCat] || currentCat} RANKING — 総投票数 ${totalVotes}票</div>
      <div class="ranking-list">
        ${items.map((item, i) => {
          const pct = maxCount > 0 ? Math.round((item.count / maxCount) * 100) : 0;
          const isMyVote = myVote === item.item_id;
          const canVote = currentUser && !myVote;
          const btnLabel = isMyVote ? '投票済' : (canVote ? '投票' : (currentUser ? '投票済' : '要ログイン'));
          const btnClass = isMyVote ? 'vote-btn voted-item' : 'vote-btn';
          const btnDisabled = !canVote || isMyVote ? 'disabled' : '';
          const onClickAttr = (canVote && !isMyVote) ? `onclick="openVoteSelect('${escHtml(item.item_id)}', '${escHtml(item.item_name)}')"` : '';
          return `<div class="rank-item" ${onClickAttr}>
            <div class="rank-num">${i + 1}</div>
            <div class="rank-info">
              <div class="rank-brand">${escHtml(item.brand)}</div>
              <div class="rank-name">${escHtml(item.item_name)}</div>
            </div>
            <div class="rank-bar-wrap">
              <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="rank-votes"><span>${item.count}</span>票</div>
            <button class="${btnClass}" ${btnDisabled} ${onClickAttr}>${btnLabel}</button>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ===== 投票選択 =====
let _selectedBrand = null;

function openVoteSelect(itemId, itemName) {
  if (!currentUser) return;
  if (userVotes[currentCat]) return;

  pendingVoteItem = null;
  _selectedBrand = null;
  const area = document.getElementById('voteSelectArea');
  const confirmBtn = document.getElementById('voteConfirmBtn');
  const msg = document.getElementById('voteMsg');

  area.classList.add('open');
  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  confirmBtn.disabled = true;
  msg.textContent = '';

  if (currentCat === 'rackets') {
    _showBrandStage(itemId);
  } else {
    _showFlatStage(itemId, itemName);
  }
}

function _showBrandStage(preselectedItemId) {
  document.getElementById('voteBrandStage').style.display = '';
  document.getElementById('voteModelStage').style.display = 'none';
  document.getElementById('voteFlatStage').style.display = 'none';
  document.getElementById('votePreviewBar').style.display = 'none';

  const items = VOTE_ITEMS.rackets;
  const brands = [...new Set(items.map(i => i.brand))];
  document.getElementById('voteBrandGrid').innerHTML = brands.map(b =>
    `<button class="vote-brand-btn" onclick="selectBrand('${escHtml(b)}')">${escHtml(b)}</button>`
  ).join('');

  // preselect: brandに対応するブランドを開く
  if (preselectedItemId) {
    const match = items.find(i => i.id === preselectedItemId);
    if (match) { setTimeout(() => selectBrand(match.brand, preselectedItemId), 10); }
  }
}

function selectBrand(brand, preselectedId) {
  _selectedBrand = brand;
  document.querySelectorAll('.vote-brand-btn').forEach(b => b.classList.toggle('selected', b.textContent === brand));
  document.getElementById('voteBrandStage').style.display = 'none';
  document.getElementById('voteModelStage').style.display = '';
  document.getElementById('voteSelectedBrandLabel').textContent = brand;

  const models = VOTE_ITEMS.rackets.filter(i => i.brand === brand);
  document.getElementById('voteModelGrid').innerHTML = models.map(m => {
    const imgHtml = m.imageUrl
      ? `<img class="vote-model-img" src="${escHtml(m.imageUrl)}" alt="${escHtml(m.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="vote-model-img-ph" style="display:none">🎾</div>`
      : `<div class="vote-model-img-ph">🎾</div>`;
    return `<button class="vote-model-btn${preselectedId === m.id ? ' selected' : ''}"
      onclick="selectModelVote(this,'${escHtml(m.id)}','${escHtml(m.name)}','${escHtml(m.brand)}','${escHtml(m.imageUrl||'')}')">
      ${imgHtml}
      <div class="vote-model-name">${escHtml(m.name)}</div>
    </button>`;
  }).join('');

  if (preselectedId) {
    const m = models.find(x => x.id === preselectedId);
    if (m) _setPreview(m.brand, m.name, m.imageUrl);
    pendingVoteItem = models.find(x => x.id === preselectedId)
      ? { id: preselectedId, name: models.find(x => x.id === preselectedId).name } : null;
    document.getElementById('voteConfirmBtn').disabled = !pendingVoteItem;
  }
}

function backToBrandSelect() {
  pendingVoteItem = null;
  document.getElementById('voteConfirmBtn').disabled = true;
  document.getElementById('votePreviewBar').style.display = 'none';
  document.getElementById('voteModelStage').style.display = 'none';
  document.getElementById('voteBrandStage').style.display = '';
}

function selectModelVote(btn, id, name, brand, imageUrl) {
  document.querySelectorAll('.vote-model-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  pendingVoteItem = { id, name };
  document.getElementById('voteConfirmBtn').disabled = false;
  _setPreview(brand, name, imageUrl);
}

function _setPreview(brand, name, imageUrl) {
  const bar = document.getElementById('votePreviewBar');
  const img = document.getElementById('votePreviewImg');
  const brandEl = document.getElementById('votePreviewBrand');
  const nameEl = document.getElementById('votePreviewName');
  brandEl.textContent = brand;
  nameEl.textContent = name;
  if (imageUrl) {
    img.src = imageUrl;
    img.style.display = '';
  } else {
    img.style.display = 'none';
  }
  bar.style.display = 'flex';
}

function _showFlatStage(itemId, itemName) {
  document.getElementById('voteBrandStage').style.display = 'none';
  document.getElementById('voteModelStage').style.display = 'none';
  document.getElementById('voteFlatStage').style.display = '';

  const items = VOTE_ITEMS[currentCat] || [];
  document.getElementById('voteOptions').innerHTML = items.map(it => `
    <button class="vote-option-btn${it.id === itemId ? ' selected' : ''}" onclick="selectVoteOption(this,'${escHtml(it.id)}','${escHtml(it.name)}')">
      <span class="vote-option-brand">${escHtml(it.brand)}</span>
      ${escHtml(it.name)}
    </button>
  `).join('');

  if (itemId) {
    pendingVoteItem = { id: itemId, name: itemName };
    document.getElementById('voteConfirmBtn').disabled = false;
  }
}

function selectVoteOption(btn, id, name) {
  document.querySelectorAll('.vote-option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  pendingVoteItem = { id, name };
  document.getElementById('voteConfirmBtn').disabled = false;
}

function closeVoteSelect() {
  document.getElementById('voteSelectArea').classList.remove('open');
  pendingVoteItem = null;
  _selectedBrand = null;
}

async function submitVote() {
  if (!pendingVoteItem || !currentUser) return;
  const confirmBtn = document.getElementById('voteConfirmBtn');
  const msg = document.getElementById('voteMsg');
  confirmBtn.disabled = true;
  msg.textContent = '送信中...';

  const { error } = await sb.from('votes').insert({
    user_id: currentUser.id,
    category: currentCat,
    item_id: pendingVoteItem.id,
    item_name: pendingVoteItem.name,
  });

  if (error) {
    if (error.code === '23505') {
      msg.textContent = '既にこのカテゴリーに投票済みです';
    } else {
      msg.textContent = 'エラーが発生しました: ' + error.message;
    }
    confirmBtn.disabled = false;
    return;
  }

  userVotes[currentCat] = pendingVoteItem.id;
  rankingData[currentCat] = null;
  closeVoteSelect();
  document.getElementById('rankingArea').innerHTML = '<div class="loading-state"><span class="spin"></span>集計中...</div>';
  await loadRanking(currentCat);
  renderUI();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();

</script>

</html>
